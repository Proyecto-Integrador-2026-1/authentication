spring.application.name=redpatitas-authentication-service

# --- API ---
server.port=8082
server.forward-headers-strategy=framework
spring.mvc.problemdetails.enabled=false
# No exponer stack traces en respuestas de error genéricas (/error)
spring.web.error.include-stacktrace=never

# CONEXIÓN BACKEND
auth.internal.api-key=tu-clave-secreta-mensajes


# --- Base de datos ---
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=redpatitas
spring.datasource.password=redpatitas
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Seguridad HTTP (cabeceras, rate limit login, HSTS solo HTTPS) ---
app.security.hsts-enabled=false
app.security.login-rate-limit-per-minute=100

# --- Persistencia común ---
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# --- JWT (usar variables de entorno en producción) ---
app.jwt.secret=change-me-in-development-use-at-least-32-bytes
app.jwt.access-token-ttl-seconds=3600
app.jwt.refresh-token-ttl-seconds=604800

# --- CORS restrictivo (lista explícita) ---
app.cors.allowed-origins=*

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logs estructurados (consola; traceId desde filtro) ---
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%t] traceId=%X{traceId:-} %logger{36} - %m%n
