services:
  auth-db:
    image: postgres:18-alpine
    container_name: red_auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: redpatitas
      POSTGRES_PASSWORD: redpatitas
    ports:
      - "5432:5432"
    volumes:
      - auth_red_data:/var/lib/postgresql

volumes:
  auth_red_data:
