services:
  auth-db:
    image: postgres:18-alpine
    container_name: redpatitas_auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: redpatitas
      POSTGRES_PASSWORD: redpatitas
    ports:
      - "5432:5432"
    volumes:
      - auth_redpatitas_data:/var/lib/postgresql/data

volumes:
  auth_redpatitas_data:
